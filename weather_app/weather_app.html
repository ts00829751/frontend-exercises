<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather App</title>
  <link rel="stylesheet" href="weather_app.css">
</head>

<body>
  <main>

    <div id="weather-information">
      <h1 id="location"></h1>
      <h2 id="main-temperature"></h2>
      <div id="main-information">
        <img id="weather-icon" src="" alt="">
        <h2 id="weather-main"></h2>
      </div>
      <hr id="hr">
      <p id="feels-like"></p>
      <p id="humidity"></p>
      <p id="wind"></p>
      <p id="wind-gust"></p>
    </div>

    <div id="user-interface">
      <label for="city">Weather for:</label>
      <select id="city" name="city">
          <option value=""></option>
          <option value="new york">New York</option>
          <option value="los angeles">Los Angeles</option>
          <option value="chicago">Chicago</option>
          <option value="paris">Paris</option>
          <option value="tokyo">Tokyo</option>
          <option value="london">London</option>
        </select>
      <button id="get-weather-btn" type="button">Get Weahter</button>
    </div>

  </main>

  <script src="weather_app.js"></script>
</body>

</html>
