<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drum Machine</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div id="drum-machine">
      <div id="pad-bank">
        <button  class="drum-pad" type="button">
          Q
          <audio id="Q" class="clip" src="https://cdn.freecodecamp.org/curriculum/drum/Heater-1.mp3">
          </audio>
        </button>
        <button class="drum-pad" type="button">
          W
          <audio id="W" class="clip" src="https://cdn.freecodecamp.org/curriculum/drum/Heater-2.mp3">
          </audio>
        </button>
        <button class="drum-pad" type="button">
          E
          <audio id="E" class="clip" src="https://cdn.freecodecamp.org/curriculum/drum/Heater-3.mp3">
          </audio>
        </button>
        <button class="drum-pad" type="button">
          A
          <audio id="A" class="clip" src="https://cdn.freecodecamp.org/curriculum/drum/Heater-4_1.mp3">
          </audio>
        </button>
        <button class="drum-pad" type="button">
          S
          <audio id="S" class="clip" src="https://cdn.freecodecamp.org/curriculum/drum/Heater-6.mp3">
          </audio>
        </button>
        <button class="drum-pad" type="button">
          D
          <audio id="D" class="clip" src="https://cdn.freecodecamp.org/curriculum/drum/Dsc_Oh.mp3">
          </audio>
        </button>
        <button class="drum-pad" type="button">
          Z
          <audio id="Z" class="clip" src="https://cdn.freecodecamp.org/curriculum/drum/Kick_n_Hat.mp3">
          </audio>
        </button>
        <button class="drum-pad" type="button">
          X
          <audio id="X" class="clip" src="https://cdn.freecodecamp.org/curriculum/drum/RP4_KICK_1.mp3">
          </audio>
        </button>
        <button class="drum-pad" type="button">
          C
          <audio id="C" class="clip" src="https://cdn.freecodecamp.org/curriculum/drum/Cev_H2.mp3">
          </audio>
        </button>
      </div>
      <p id="display"></p>
    </div>
    <script src="script.js"></script>
  </body>
</html>
